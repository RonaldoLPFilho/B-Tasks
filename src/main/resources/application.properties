spring.application.name=tasks-api

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/tasksdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:userzinho}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

openai.api.key=${OPENAI_API_KEY:}
jwt.secret=${JWT_SECRET:development-only-jwt-secret-key-change-me-123456}
jwt.expiration-hours=${JWT_EXPIRATION_HOURS:4}
tasks.vault.encryption-key=${TASKS_VAULT_ENCRYPTION_KEY:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
tasks.vault.token-ttl-minutes=${TASKS_VAULT_TOKEN_TTL_MINUTES:10}

tasks.audio.base-path=${TASKS_AUDIO_BASE_PATH:/home/ronis/Music/tasks-audios}

tasks.files.storage.provider=${TASKS_FILES_STORAGE_PROVIDER:local}
tasks.files.storage.base-path=${TASKS_FILES_STORAGE_BASE_PATH:/run/media/ronis/Hdzada/MyTasks-Files}
tasks.files.storage.max-file-size-bytes=${TASKS_FILES_MAX_FILE_SIZE_BYTES:52428800}
tasks.howtodo.storage.provider=${TASKS_HOWTODO_STORAGE_PROVIDER:local}
tasks.howtodo.storage.base-path=${TASKS_HOWTODO_STORAGE_BASE_PATH:/run/media/ronis/Hdzada/MyTasks-MD}
tasks.howtodo.storage.max-file-size-bytes=${TASKS_HOWTODO_MAX_FILE_SIZE_BYTES:10485760}
spring.servlet.multipart.max-file-size=${TASKS_FILES_MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${TASKS_FILES_MAX_REQUEST_SIZE:50MB}

server.address=0.0.0.0
server.port=${SERVER_PORT:8080}
