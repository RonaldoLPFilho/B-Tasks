spring.application.name=tasks-api

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tasksdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:userzinho}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

openai.api.key=${OPENAI_API_KEY:}
jwt.secret=${JWT_SECRET:development-only-jwt-secret-key-change-me-123456}
jwt.expiration-hours=${JWT_EXPIRATION_HOURS:4}

tasks.audio.base-path=${TASKS_AUDIO_BASE_PATH:/home/ronis/Music/tasks-audios}

server.address=0.0.0.0
server.port=${SERVER_PORT:8080}
